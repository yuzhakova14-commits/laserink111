<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Заполнение договора</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color, #ffffff);
      color: var(--text-color, #000000);
      padding: 16px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    body.dark {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --card-bg: #2a2a2a;
      --border-color: #3a3a3a;
      --input-bg: #333333;
      --input-border: #444444;
      --input-text: #e0e0e0;
      --section-bg: #252525;
      --hint-color: #888888;
    }

    body.light {
      --bg-color: #ffffff;
      --text-color: #000000;
      --card-bg: #ffffff;
      --border-color: #e0e0e0;
      --input-bg: #ffffff;
      --input-border: #d0d0d0;
      --input-text: #000000;
      --section-bg: #f5f5f5;
      --hint-color: #888888;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* Screen 1: Welcome */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      background: var(--tg-theme-button-color, #2481cc);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .welcome-icon svg {
      width: 44px;
      height: 44px;
      fill: #ffffff;
    }

    .welcome-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-color);
    }

    .welcome-desc {
      font-size: 15px;
      color: var(--hint-color, #888);
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 300px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 300px;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      transition: opacity 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    .btn-primary:active {
      opacity: 0.7;
    }

    /* Screen 2: Form */
    .form-header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      margin-right: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-back svg {
      width: 24px;
      height: 24px;
      fill: var(--tg-theme-button-color, #2481cc);
    }

    .form-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-color);
    }

    .form-section {
      background: var(--card-bg, #fff);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color, #e0e0e0);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tg-theme-button-color, #2481cc);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--hint-color, #888);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--input-border, #d0d0d0);
      border-radius: 10px;
      font-size: 15px;
      background: var(--input-bg, #fff);
      color: var(--input-text, #000);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: var(--tg-theme-button-color, #2481cc);
    }

    .form-group input::placeholder {
      color: var(--hint-color, #aaa);
    }

    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-submit:hover {
      opacity: 0.85;
    }

    .btn-submit:active {
      opacity: 0.7;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--tg-theme-button-color, #2481cc);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.3s ease;
      max-width: 90%;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #e53935;
    }
  </style>
</head>
<body>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Screen 1: Welcome -->
  <div class="screen active" id="screen-welcome">
    <div class="welcome-container">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6zm2-7h8v1.5H8V13zm0 3h6v1.5H8V16zm0-6h3v1.5H8V10z"/>
        </svg>
      </div>
      <div class="welcome-title">Заполнение договора</div>
      <div class="welcome-desc">
        Заполните реквизиты вашей компании, и мы автоматически сформируем готовый договор в формате PDF
      </div>
      <button class="btn-primary" onclick="showScreen('screen-form')">Заполнить договор</button>
    </div>
  </div>

  <!-- Screen 2: Form -->
  <div class="screen" id="screen-form">
    <div class="form-header">
      <button class="btn-back" onclick="showScreen('screen-welcome')">
        <svg viewBox="0 0 24 24">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </button>
      <div class="form-title">Реквизиты договора</div>
    </div>

    <form id="contract-form" onsubmit="return handleSubmit(event)">
      <!-- Section: Основные данные -->
      <div class="form-section">
        <div class="section-title">Основные данные</div>
        <div class="form-group">
          <label>Номер договора</label>
          <input type="text" name="Номер договора" placeholder="Например: 123/2025" required>
        </div>
        <div class="form-group">
          <label>Форма</label>
          <input type="text" name="Форма" placeholder="Например: ООО, АО, ИП">
        </div>
        <div class="form-group">
          <label>Компания</label>
          <input type="text" name="Компания" placeholder="Название организации" required>
        </div>
        <div class="form-group">
          <label>ФИО директора</label>
          <input type="text" name="в лице - ФИО директора" placeholder="Иванов Иван Иванович" required>
        </div>
      </div>

      <!-- Section: Регистрационные данные -->
      <div class="form-section">
        <div class="section-title">Регистрационные данные</div>
        <div class="form-group">
          <label>ОГРН</label>
          <input type="text" name="ОГРН" placeholder="13 или 15 цифр" required>
        </div>
        <div class="form-group">
          <label>ИНН</label>
          <input type="text" name="ИНН" placeholder="10 или 12 цифр" required>
        </div>
        <div class="form-group">
          <label>КПП</label>
          <input type="text" name="КПП" placeholder="9 цифр">
        </div>
        <div class="form-group">
          <label>ОКПО</label>
          <input type="text" name="ОКПО" placeholder="8 или 10 цифр">
        </div>
      </div>

      <!-- Section: Контактные данные -->
      <div class="form-section">
        <div class="section-title">Контактные данные</div>
        <div class="form-group">
          <label>Адрес</label>
          <input type="text" name="Адрес" placeholder="Юридический адрес" required>
        </div>
        <div class="form-group">
          <label>Контактный телефон</label>
          <input type="tel" name="Контактный телефон" placeholder="+7 (___) ___-__-__">
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" name="E-mail" placeholder="mail@company.ru">
        </div>
      </div>

      <!-- Section: Банковские реквизиты -->
      <div class="form-section">
        <div class="section-title">Банковские реквизиты</div>
        <div class="form-group">
          <label>Р/с</label>
          <input type="text" name="Р/с" placeholder="Расчётный счёт (20 цифр)">
        </div>
        <div class="form-group">
          <label>Банк</label>
          <input type="text" name="Банк" placeholder="Название банка">
        </div>
        <div class="form-group">
          <label>БИК</label>
          <input type="text" name="БИК" placeholder="9 цифр">
        </div>
        <div class="form-group">
          <label>К/с</label>
          <input type="text" name="К/с" placeholder="Корреспондентский счёт (20 цифр)">
        </div>
      </div>

      <!-- Section: Подпись -->
      <div class="form-section">
        <div class="section-title">Подпись</div>
        <div class="form-group">
          <label>Инициалы</label>
          <input type="text" name="Инициалы" placeholder="И.И. Иванов" required>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">
        Отправить
      </button>
    </form>
  </div>

  <script>
    // ── Telegram WebApp SDK ──
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();

      // Apply Telegram color scheme
      if (tg.colorScheme === 'dark') {
        document.body.classList.add('dark');
      } else {
        document.body.classList.add('light');
      }

      // Configure main button
      tg.MainButton.setParams({
        text: 'Заполнить договор',
        color: tg.themeParams.button_color || '#2481cc',
        text_color: tg.themeParams.button_text_color || '#ffffff',
        is_visible: false
      });

      tg.MainButton.onClick(function () {
        if (document.getElementById('screen-welcome').classList.contains('active')) {
          showScreen('screen-form');
        }
      });
    } else {
      document.body.classList.add('light');
    }

    // ── Screen switching ──
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
      window.scrollTo(0, 0);

      if (tg) {
        if (screenId === 'screen-welcome') {
          tg.MainButton.setText('Заполнить договор');
          tg.MainButton.show();
        } else {
          tg.MainButton.hide();
        }
      }
    }

    // Show main button on welcome screen
    if (tg) {
      tg.MainButton.show();
    }

    // ── Toast ──
    function showToast(message, isError) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '');
      setTimeout(function () { toast.classList.add('show'); }, 10);
      setTimeout(function () { toast.classList.remove('show'); }, 3500);
    }

    // ── Form submission ──
    function handleSubmit(event) {
      event.preventDefault();

      var form = document.getElementById('contract-form');
      var formData = new FormData(form);
      var data = {};
      formData.forEach(function (value, key) {
        data[key] = value;
      });

      var btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Отправка...';

      var API_URL = 'https://expert.docupilot.app/dashboard/documents/create/f4cc87e7/5c334447?download=true';

      fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(function (response) {
        if (!response.ok) {
          throw new Error('Ошибка сервера: ' + response.status);
        }
        return response.json();
      })
      .then(function (result) {
        if (result.status === 'success' && result.data && result.data.file_url) {
          var a = document.createElement('a');
          a.href = result.data.file_url;
          a.download = result.data.file_name || ('Договор_' + (data['Номер договора'] || 'document') + '.pdf');
          a.target = '_blank';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          showToast('Договор сформирован и скачивается', false);
        } else if (result.status === 'success') {
          showToast('Договор отправлен на доставки', false);
        } else {
          showToast('Неожиданный ответ: ' + JSON.stringify(result), true);
        }
      })
      .catch(function (error) {
        showToast('Ошибка: ' + error.message, true);
      })
      .finally(function () {
        btn.disabled = false;
        btn.innerHTML = 'Отправить';
      });

      return false;
    }
  </script>
</body>
</html>
