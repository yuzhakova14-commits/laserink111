<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документы</title>
    
    <!-- 1. Подключаем официальный скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Сбрасываем базовые отступы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Подстраиваем фон под тему Телеграма */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        .Main {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
        }

        /* Стилизуем кнопки, используя переменные цвета Телеграма */
        .button {
            padding: 14px 20px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* Эффект при нажатии на кнопку */
        .button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="Main">
        <button class="button" onclick="openLink('https://expert.docupilot.app/dashboard/documents/create/f4cc87e7/5c334447')">
            Заполнить договор
        </button>
        
        <button class="button" onclick="openLink('https://expert.docupilot.app/dashboard/documents/create/f4cc87e7/5c334447?download=true')">
            Заполнить договор и скачать
        </button>
    </div>

    <script>
        // 2. Инициализируем мини-приложение
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Телеграму, что приложение загрузилось
        tg.expand(); // Разворачиваем интерфейс на весь экран

        // 3. Пишем функцию, которая будет срабатывать при клике
        function openLink(url) {
            // Если в ссылке есть параметр скачивания (?download=true)
            if (url.includes('download=true')) {
                // Открываем в системном браузере (Safari/Chrome), 
                // чтобы файл гарантированно скачался, а не завис во встроенном браузере ТГ
                window.open(url, '_blank');
            } else {
                // Обычные ссылки открываем внутри окна Телеграма
                tg.openLink(url);
            }
        }
    </script>

</body>
</html>
